<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Khong co ket noi - ANIMA 119</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          sans-serif;
        background: linear-gradient(135deg, #0A1628 0%, #1A2744 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        color: #fff;
      }
      .container {
        text-align: center;
        max-width: 400px;
      }
      .icon {
        font-size: 80px;
        margin-bottom: 24px;
        animation: float 3s ease-in-out infinite;
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }
      h1 {
        font-size: 28px;
        margin-bottom: 16px;
        font-weight: 700;
        color: #C5A55A;
      }
      p {
        font-size: 16px;
        opacity: 0.9;
        line-height: 1.6;
        margin-bottom: 32px;
      }
      .retry-btn {
        background: #C5A55A;
        color: #0A1628;
        border: none;
        padding: 16px 32px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 100px;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-block;
      }
      .retry-btn:hover {
        background: #b8963f;
        transform: scale(1.05);
      }
      .brand {
        margin-top: 48px;
        font-size: 14px;
        opacity: 0.7;
        color: #C5A55A;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">&#9775;</div>
      <h1>Khong co ket noi mang</h1>
      <p>
        Co ve nhu ban dang offline. Hay kiem tra ket noi internet va thu lai.
      </p>
      <button class="retry-btn" onclick="window.location.reload()">
        Thu lai
      </button>
      <div class="brand">ANIMA 119 - Dong Y Len Men Han Quoc</div>
    </div>
  </body>
</html>
